<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parceiro — Sublimitas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .partner-page { min-height: 100vh; }
    .partner-banner { position: relative; height: 320px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .partner-banner-bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .partner-banner-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,0,0,0.6), rgba(0,0,0,0.3)); }
    .partner-banner-content { position: relative; z-index: 1; text-align: center; color: var(--white); padding: 20px; }
    .partner-logo-wrap { width: 120px; height: 120px; border-radius: 50%; background: var(--white); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 4px solid rgba(255,255,255,0.3); }
    .partner-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .partner-logo-wrap span { font-size: 3rem; }
    .partner-name { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .partner-desc { font-size: 1.1rem; opacity: 0.9; max-width: 600px; margin: 0 auto 24px; }
    .partner-contact-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--whatsapp); color: var(--white); padding: 14px 32px; border-radius: var(--radius-full); font-weight: 700; font-size: 1.05rem; transition: all var(--transition); text-decoration: none; }
    .partner-contact-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,0.4); }
    .partner-products { padding: 60px 0; }
    .partner-products .section-header { margin-bottom: 40px; }
    .partner-not-found { text-align: center; padding: 120px 20px; }
    .partner-not-found h2 { font-size: 2rem; margin-bottom: 12px; }
    .partner-not-found p { color: var(--gray-500); margin-bottom: 24px; }
    .partner-footer { background: var(--gray-900); color: var(--gray-400); padding: 40px 0; text-align: center; }
    .partner-footer .logo { justify-content: center; margin-bottom: 12px; }
    .partner-footer p { font-size: 0.9rem; }
    @media (max-width: 768px) {
      .partner-banner { height: 260px; }
      .partner-name { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <header class="header" id="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Sublimitas</span>
      </a>
      <div class="header-actions">
        <a href="/carrinho" class="btn-icon cart-icon">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></a>
        <a href="/login" class="btn btn-outline btn-sm">Entrar</a>
      </div>
    </div>
  </header>

  <main class="partner-page">
    <div id="partnerNotFound" class="partner-not-found" style="display:none">
      <h2>Parceiro não encontrado</h2>
      <p>Este parceiro não está disponível no momento.</p>
      <a href="/" class="btn btn-primary">Voltar ao Início</a>
    </div>

    <div id="partnerContent" style="display:none">
      <section class="partner-banner" id="partnerBanner">
        <div class="partner-banner-bg" id="partnerBannerBg"></div>
        <div class="partner-banner-overlay"></div>
        <div class="partner-banner-content">
          <div class="partner-logo-wrap" id="partnerLogo"></div>
          <h1 class="partner-name" id="partnerName"></h1>
          <p class="partner-desc" id="partnerDesc"></p>
          <a href="#" class="partner-contact-btn" id="partnerWhatsapp" target="_blank">
            💬 Fale Conosco no WhatsApp
          </a>
        </div>
      </section>

      <section class="partner-products">
        <div class="container">
          <div class="section-header">
            <h2>Nossos Produtos</h2>
            <p>Conheça os produtos personalizados deste parceiro</p>
          </div>
          <div class="products-grid" id="partnerProductsGrid">
            <div class="loading-spinner"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="partner-footer">
    <div class="container">
      <a href="/" class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Sublimitas</span>
      </a>
      <p>&copy; <span id="year"></span> Sublimitas. Todos os direitos reservados.</p>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/main.js"></script>
  <script>
    let partnerData = null;

    async function loadPartner() {
      const pathParts = window.location.pathname.split('/');
      const slug = pathParts[pathParts.length - 1];

      if (!slug) {
        showNotFound();
        return;
      }

      try {
        const res = await fetch(`/api/products?partner_slug=${encodeURIComponent(slug)}`);
        if (!res.ok) {
          showNotFound();
          return;
        }

        const defaultColors = { primary: '#7B2FBE', accent: '#FF6B00' };

        partnerData = {
          slug: slug,
          company_name: 'Parceiro Sublimitas',
          description: 'Produtos personalizados com qualidade profissional',
          logo_url: '',
          banner_url: '',
          primary_color: defaultColors.primary,
          whatsapp_message: 'Olá! Vim pelo site da Sublimitas e gostaria de saber mais sobre seus produtos personalizados.'
        };

        renderPartner();
        loadPartnerProducts(slug);
      } catch {
        showNotFound();
      }
    }

    function showNotFound() {
      document.getElementById('partnerNotFound').style.display = 'block';
      document.getElementById('partnerContent').style.display = 'none';
    }

    function renderPartner() {
      document.getElementById('partnerContent').style.display = 'block';
      document.getElementById('partnerNotFound').style.display = 'none';

      document.title = `${partnerData.company_name} — Sublimitas`;

      const banner = document.getElementById('partnerBanner');
      const primary = partnerData.primary_color || '#7B2FBE';
      banner.style.background = `linear-gradient(135deg, ${primary}, ${primary}cc)`;

      if (partnerData.banner_url) {
        document.getElementById('partnerBannerBg').style.backgroundImage = `url(${partnerData.banner_url})`;
        banner.style.background = 'none';
      }

      const logoWrap = document.getElementById('partnerLogo');
      if (partnerData.logo_url) {
        logoWrap.innerHTML = `<img src="${partnerData.logo_url}" alt="${partnerData.company_name}">`;
      } else {
        logoWrap.innerHTML = `<span>✦</span>`;
      }

      document.getElementById('partnerName').textContent = partnerData.company_name;
      document.getElementById('partnerDesc').textContent = partnerData.description || '';

      const msg = encodeURIComponent(partnerData.whatsapp_message || 'Olá!');
      const phone = partnerData.whatsapp_number ? partnerData.whatsapp_number.replace(/\D/g, '') : '5500000000000';
      document.getElementById('partnerWhatsapp').href = `https://wa.me/${phone}?text=${msg}`;
    }

    async function loadPartnerProducts(slug) {
      const grid = document.getElementById('partnerProductsGrid');
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        const products = data.products || data || [];

        if (products.length === 0) {
          grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--gray-500);">Nenhum produto disponível</p>';
          return;
        }

        grid.innerHTML = products.slice(0, 12).map(p => {
          const img = (p.images && p.images.length > 0) ? p.images[0] : null;
          return `
            <div class="product-card">
              <div class="product-image">${img ? `<img src="${img}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover">` : '📦'}</div>
              <div class="product-info">
                <div class="product-category">${p.category_name || ''}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-price">${formatPrice(p.base_price)}</div>
              </div>
              <div class="product-actions">
                <a href="/produto?slug=${p.slug}" class="btn btn-outline btn-sm">Ver Detalhes</a>
                <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id})">Adicionar</button>
              </div>
            </div>
          `;
        }).join('');
      } catch {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--gray-500);">Erro ao carregar produtos</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadPartner();
      const yearEl = document.getElementById('year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();
    });
  </script>
</body>
</html>
